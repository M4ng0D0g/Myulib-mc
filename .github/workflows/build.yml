name: Build and Publish
on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Core
        run: ./gradlew :myulib-core:build

      - name: Build Framework
        run: ./gradlew :myulib-framework:build

      - name: Run Tests
        run: ./gradlew test

      - name: Verify Publishing
        run: ./gradlew publishToMavenLocal

      - name: JitPack Status
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "Release detected! JitPack will build version ${GITHUB_REF#refs/tags/v}"
          echo "Artifacts will be available at: https://jitpack.io/#M4ng0D0g/MyuLib-mc"
